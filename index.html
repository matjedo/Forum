<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LagsMC | Fórum</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --primary-color: #ff8c00; /* Laranja Premium */
            --text-color: #e0e0e0;
            --glow: 0 0 15px rgba(255, 140, 0, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            border-bottom: 1px solid #333;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--glow);
        }

        .container {
            width: 90%;
            max-width: 800px;
        }

        /* Form de Postagem */
        .post-form {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 2rem;
        }

        input, textarea {
            width: 100%;
            background: #252525;
            border: 1px solid #444;
            color: white;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background: var(--primary-color);
            color: black;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: var(--glow);
            transform: translateY(-2px);
        }

        /* Lista de Posts */
        .post-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 1rem;
            transition: 0.2s;
        }

        .post-card:hover {
            border-color: #ffaa33;
            background: #222;
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .post-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<header>
    <h1>LagsMC Forum</h1>
</header>

<div class="container">
    <div class="post-form">
        <input type="text" id="postTitle" placeholder="Título da discussão...">
        <textarea id="postContent" rows="3" placeholder="O que você quer compartilhar?"></textarea>
        <input type="text" id="postAuthor" placeholder="Seu Nickname">
        <button onclick="createPost()">Publicar Tópico</button>
    </div>

    <div id="postsList">
        </div>
</div>

<script>
    // Configurações do Supabase (Substitua pelos seus dados)
    const SUPABASE_URL = 'https://licxtuulcqvjdzclosas.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_HQtQ8DhCf4ZcaLjipqbDFQ_gMDzvi5s';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Carregar posts ao iniciar
    async function loadPosts() {
        const { data, error } = await supabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) console.error('Erro:', error);
        
        const list = document.getElementById('postsList');
        list.innerHTML = '';
        
        data.forEach(post => {
            list.innerHTML += `
                <div class="post-card">
                    <div class="post-title">${post.title}</div>
                    <div class="post-meta">Postado por <strong>${post.author}</strong> em ${new Date(post.created_at).toLocaleDateString()}</div>
                    <div class="post-content">${post.content}</div>
                </div>
            `;
        });
    }

    // Criar novo post
    async function createPost() {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        const author = document.getElementById('postAuthor').value;

        if (!title || !content || !author) return alert("Preencha todos os campos!");

        const { error } = await supabase
            .from('posts')
            .insert([{ title, content, author }]);

        if (error) {
            alert("Erro ao publicar!");
        } else {
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            loadPosts();
        }
    }

    loadPosts();
</script>

</body>
</html>
